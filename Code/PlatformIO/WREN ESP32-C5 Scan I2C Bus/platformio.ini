; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Info Only. Ignore any Espressif C5 Errors, as per below:
; E (106) MSPI Timing: Failed to allocate dummy cacheline for PSRAM memory barrier!
; E (107) MSPI Timing: Failed to allocate dummy cacheline for PSRAM memory barrier!

; Share the same COM port for upload and monitor.  Just unremark and adjust COMxx
[env]
; custom_port = COM10

; upload_port = ${env.custom_port}
; monitor_port = ${env.custom_port}


; ESP32-C5
[env:esp32c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c5-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200

; Libraries
lib_deps = 