esphome:
  name: wren-c5

esp32:
  board: esp32-c5-devkitc-1 
  variant: esp32c5
  framework:
    type: esp-idf

# WREN C5 Test

output:
  - platform: gpio
    pin: GPIO27
    id: blue_led

light:
  - platform: binary
    output: blue_led
    id: heartbeat

interval:
  - interval: 500ms
    then:
      - light.toggle: heartbeat

binary_sensor:
  - platform: gpio
    id: in_1a
    name: "IN 1A"
    pin:
      number: GPIO8
      mode:
        input: true
        pulldown: true

    on_press:
      - logger.log: "IN_1A ON"

    on_release:
      - logger.log: "IN_1A OFF"        

  - platform: gpio
    id: in_1b
    name: "IN 1B"
    pin:
      number: GPIO9
      mode:
        input: true
        pulldown: true
        
    on_press:
      - logger.log: "IN_1B ON"

    on_release:
      - logger.log: "IN_1B OFF"        

  - platform: gpio
    id: in_2a
    name: "IN 2A"
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true
        
    on_press:
      - logger.log: "IN_2A ON"

    on_release:
      - logger.log: "IN_2A OFF"

  - platform: gpio
    id: in_2b
    name: "IN 2B"
    pin:
      number: GPIO13
      mode:
        input: true
        pulldown: true
        
    on_press:
      - logger.log: "IN_2B ON"

    on_release:
      - logger.log: "IN_2B OFF"        

  - platform: gpio
    id: sflag
    name: "Motor Driver Fault"
    pin:
      number: GPIO10
      mode:
        input: true
        pulldown: true

    on_press:
      - logger.log: "Motor Driver Fault ACTIVE"

    on_release:
      - logger.log: "Motor Driver Fault CLEARED"

  - platform: gpio
    id: en1
    name: "EN1"
    pin:
      number: GPIO5
      mode:
        input: true

    on_press:
      - logger.log: "EN1 ON"

    on_release:
      - logger.log: "EN1 OFF"

  - platform: gpio
    id: en2
    name: "EN2"
    pin:
      number: GPIO6
      mode:
        input: true

    on_press:
      - logger.log: "EN2 ON"

    on_release:
      - logger.log: "EN2 OFF"    

# Enable Home Assistant API

api:
  encryption:
    key: "xxxx="

ota:
  - platform: esphome
    password: "xxxx"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Wren-C5-Test Fallback Hotspot"
    password: "xxxx"

captive_portal:    

logger:        